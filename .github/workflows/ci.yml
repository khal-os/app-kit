name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    name: Build & Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm turbo run build || true
      - name: Typecheck (non-blocking until sdk-split lands)
        run: pnpm turbo run typecheck || true
      - name: Lint (non-blocking until sdk-split lands)
        run: pnpm turbo run lint || true
